<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
    <title>Portfolio - Sonbra0707</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap");

        :root {
            --first-color: hsl(0, 0%, 3%);
            --title-color: hsl(220, 8%, 12%);
            --text-color: hsl(220, 8%, 56%);
            --white-color: hsl(0, 0%, 100%);
            --container-color: hsl(220, 48%, 96%);
            --body-font: "Montserrat", sans-serif;
        }

        * { box-sizing: border-box; padding: 0; margin: 0; }

        body {
            font-family: var(--body-font);
            background-color: #120F17;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #evil-eye-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .profile {
            position: relative;
            z-index: 10;
        }

        .profile__card {
            position: relative;
            width: 320px;
            height: 100px;
            display: flex;
            align-items: center;
        }

        .profile__content {
            width: 100%;
            height: 100%;
            background-color: var(--container-color);
            border-radius: 4rem .5rem .5rem 4rem;
            box-shadow: 0 8px 24px hsla(220, 48%, 20%, .2);
            display: flex;
            align-items: center;
            column-gap: .75rem;
        }

        .profile__img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--container-color);
            object-fit: cover;
        }

        .profile__data { flex-grow: 1; }
        .profile__name { color: var(--title-color); font-size: 1rem; }
        .profile__profession { font-size: .875rem; }

        .profile__button {
            width: 40px;
            height: 40px;
            background-color: var(--first-color);
            border-radius: 50%;
            display: grid;
            place-items: center;
            margin-right: .75rem;
            cursor: pointer;
            position: relative;
        }

        .profile__menu, .profile__close {
            color: var(--white-color);
            font-size: 1.5rem;
            position: absolute;
            transition: .4s;
        }

        .profile__close { opacity: 0; transform: rotate(-90deg); }

        .profile__social {
            position: absolute;
            right: -2rem;
            width: 125px;
            height: 125px;
            background-color: var(--container-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: .4s;
            pointer-events: none;
        }

        .profile__link { position: absolute; transition: .3s; }
        .profile__link span {
            width: 40px; height: 40px;
            background-color: var(--container-color);
            border-radius: 50%;
            display: grid; place-items: center;
            color: var(--first-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: .3s;
        }

        .profile__link span:hover { background-color: var(--first-color); color: var(--white-color); }

        .show-social { opacity: 1; pointer-events: auto; }
        .show-icon .profile__menu { opacity: 0; transform: rotate(90deg); }
        .show-icon .profile__close { opacity: 1; transform: rotate(0); }

        .show-social .profile__link:nth-child(1) { transform: rotate(-85deg) translateX(96px) rotate(85deg); }
        .show-social .profile__link:nth-child(2) { transform: rotate(-45deg) translateX(96px) rotate(45deg); }
        .show-social .profile__link:nth-child(3) { transform: rotate(0) translateX(96px) rotate(0); }
        .show-social .profile__link:nth-child(4) { transform: rotate(45deg) translateX(96px) rotate(-45deg); }
        .show-social .profile__link:nth-child(5) { transform: rotate(85deg) translateX(96px) rotate(-85deg); }
    </style>
</head>
<body>

    <div id="evil-eye-container"></div>

    <div class="profile">
        <div class="profile__card">
            <div class="profile__content">
                <img src="mg2.png" alt="Perfil" class="profile__img">
                <div class="profile__data">
                    <h3 class="profile__name">Sonbra0707</h3>
                    <p class="profile__profession">Web Developer</p>
                </div>
                <div class="profile__button" id="profile-btn">
                    <i class="ri-menu-line profile__menu"></i>
                    <i class="ri-close-large-line profile__close"></i>
                </div>
            </div>

            <div class="profile__social" id="profile-social">
                <a href="https://codepen.io/Sonbra0707" target="_blank" class="profile__link"><span><i class="ri-codepen-line"></i></span></a>
                <a href="https://www.facebook.com/" target="_blank" class="profile__link"><span><i class="ri-facebook-circle-line"></i></span></a>
                <a href="https://github.com/Sonbra0707" target="_blank" class="profile__link"><span><i class="ri-github-line"></i></span></a>
                <a href="https://www.instagram.com/hypeinfinity.ofc" target="_blank" class="profile__link"><span><i class="ri-instagram-line"></i></span></a>
                <a href="https://dribbble.com/sonbra-0707" target="_blank" class="profile__link"><span><i class="ri-dribbble-line"></i></span></a>
            </div>
        </div>
    </div>

    <script type="module">
        import { Renderer, Program, Mesh, Triangle, Texture } from 'https://cdn.jsdelivr.net/npm/ogl@0.0.32/dist/ogl.mjs';

        const vertexShader = `attribute vec2 uv;attribute vec2 position;varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,0,1);}`;
        const fragmentShader = `precision highp float;uniform float uTime;uniform vec3 uResolution;uniform sampler2D uNoiseTexture;uniform float uPupilSize;uniform float uIrisWidth;uniform float uGlowIntensity;uniform float uIntensity;uniform float uScale;uniform float uNoiseScale;uniform vec2 uMouse;uniform float uPupilFollow;uniform float uFlameSpeed;uniform vec3 uEyeColor;uniform vec3 uBgColor;void main(){vec2 uv=(gl_FragCoord.xy*2.0-uResolution.xy)/uResolution.y;uv/=uScale;float ft=uTime*uFlameSpeed;float polarRadius=length(uv)*2.0;float polarAngle=(2.0*atan(uv.x,uv.y))/6.28*0.3;vec2 polarUv=vec2(polarRadius,polarAngle);vec4 noiseA=texture2D(uNoiseTexture,polarUv*vec2(0.2,7.0)*uNoiseScale+vec2(-ft*0.1,0.0));vec4 noiseB=texture2D(uNoiseTexture,polarUv*vec2(0.3,4.0)*uNoiseScale+vec2(-ft*0.2,0.0));vec4 noiseC=texture2D(uNoiseTexture,polarUv*vec2(0.1,5.0)*uNoiseScale+vec2(-ft*0.1,0.0));float distanceMask=1.0-length(uv);float innerRing=clamp(-1.0*((distanceMask-0.7)/uIrisWidth),0.0,1.0);innerRing=(innerRing*distanceMask-0.2)/0.28;innerRing+=noiseA.r-0.5;innerRing*=1.3;innerRing=clamp(innerRing,0.0,1.0);float outerRing=clamp(-1.0*((distanceMask-0.5)/0.2),0.0,1.0);outerRing=(outerRing*distanceMask-0.1)/0.38;outerRing+=noiseC.r-0.5;outerRing*=1.3;outerRing=clamp(outerRing,0.0,1.0);innerRing+=outerRing;float innerEye=distanceMask-0.1*2.0;innerEye*=noiseB.r*2.0;vec2 pupilOffset=uMouse*uPupilFollow*0.12;vec2 pupilUv=uv-pupilOffset;float pupil=1.0-length(pupilUv*vec2(9.0,2.3));pupil*=uPupilSize;pupil=clamp(pupil,0.0,1.0);pupil/=0.35;float outerEyeGlow=1.0-length(uv*vec2(0.5,1.5));outerEyeGlow=clamp(outerEyeGlow+0.5,0.0,1.0);outerEyeGlow+=noiseC.r-0.5;float outerBgGlow=outerEyeGlow;outerEyeGlow=pow(outerEyeGlow,2.0);outerEyeGlow+=distanceMask;outerEyeGlow*=uGlowIntensity;outerEyeGlow=clamp(outerEyeGlow,0.0,1.0);outerEyeGlow*=pow(1.0-distanceMask,2.0)*2.5;outerBgGlow+=distanceMask;outerBgGlow=pow(outerBgGlow,0.5);outerBgGlow*=0.15;vec3 color=uEyeColor*uIntensity*clamp(max(innerRing+innerEye,outerEyeGlow+outerBgGlow)-pupil,0.0,3.0);color+=uBgColor;gl_FragColor=vec4(color,1.0);}`;

        function generateNoiseTexture(size=256){const data=new Uint8Array(size*size*4);function hash(x,y,s){let n=x*374761393+y*668265263+s*1274126177;n=Math.imul(n^(n>>>13),1274126177);return((n^(n>>>16))>>>0)/4294967296}function noise(px,py,freq,seed){const fx=(px/size)*freq;const fy=(py/size)*freq;const ix=Math.floor(fx);const iy=Math.floor(fy);const tx=fx-ix;const ty=fy-iy;const w=freq|0;const v00=hash(((ix%w)+w)%w,((iy%w)+w)%w,seed);const v10=hash((((ix+1)%w)+w)%w,((iy%w)+w)%w,seed);const v01=hash(((ix%w)+w)%w,(((iy+1)%w)+w)%w,seed);const v11=hash((((ix+1)%w)+w)%w,(((iy+1)%w)+w)%w,seed);return v00*(1-tx)*(1-ty)+v10*tx*(1-ty)+v01*(1-tx)*ty+v11*tx*ty}for(let y=0;y<size;y++){for(let x=0;x<size;x++){let v=0;let amp=0.4;let totalAmp=0;for(let o=0;o<8;o++){const f=32*(1<<o);v+=amp*noise(x,y,f,o*31);totalAmp+=amp;amp*=0.65}v/=totalAmp;v=(v-0.5)*2.2+0.5;v=Math.max(0,Math.min(1,v));const val=Math.round(v*255);const i=(y*size+x)*4;data[i]=val;data[i+1]=val;data[i+2]=val;data[i+3]=255}}return data}
        function hexToVec3(hex){const h=hex.replace('#','');return[parseInt(h.slice(0,2),16)/255,parseInt(h.slice(2,4),16)/255,parseInt(h.slice(4,6),16)/255]}

        const container=document.getElementById('evil-eye-container');
        const renderer=new Renderer({alpha:true});
        const gl=renderer.gl;
        const noiseData=generateNoiseTexture(256);
        const noiseTexture=new Texture(gl,{image:noiseData,width:256,height:256,generateMipmaps:false,flipY:false});
        noiseTexture.minFilter=gl.LINEAR;noiseTexture.magFilter=gl.LINEAR;noiseTexture.wrapS=gl.REPEAT;noiseTexture.wrapT=gl.REPEAT;
        const mouse={x:0,y:0,tx:0,ty:0};
        window.addEventListener('mousemove',e=>{const rect=container.getBoundingClientRect();mouse.tx=((e.clientX-rect.left)/rect.width)*2-1;mouse.ty=-(((e.clientY-rect.top)/rect.height)*2-1)});
        window.addEventListener('mouseleave',()=>{mouse.tx=0;mouse.ty=0});
        const geometry=new Triangle(gl);
        const program=new Program(gl,{vertex:vertexShader,fragment:fragmentShader,uniforms:{uTime:{value:0},uResolution:{value:[0,0,0]},uNoiseTexture:{value:noiseTexture},uPupilSize:{value:0.6},uIrisWidth:{value:0.25},uGlowIntensity:{value:0.35},uIntensity:{value:1.5},uScale:{value:0.8},uNoiseScale:{value:1.0},uMouse:{value:[0,0]},uPupilFollow:{value:1.0},uFlameSpeed:{value:1.0},uEyeColor:{value:hexToVec3('#FF6F37')},uBgColor:{value:hexToVec3('#120F17')}}});
        const mesh=new Mesh(gl,{geometry,program});
        function resize(){renderer.setSize(window.innerWidth,window.innerHeight);program.uniforms.uResolution.value=[gl.canvas.width,gl.canvas.height,gl.canvas.width/gl.canvas.height]}
        window.addEventListener('resize',resize);resize();container.appendChild(gl.canvas);
        function update(t){requestAnimationFrame(update);mouse.x+=(mouse.tx-mouse.x)*0.05;mouse.y+=(mouse.ty-mouse.y)*0.05;program.uniforms.uMouse.value=[mouse.x,mouse.y];program.uniforms.uTime.value=t*0.001;renderer.render({scene:mesh})}
        requestAnimationFrame(update);

        const btn=document.getElementById('profile-btn');
        const social=document.getElementById('profile-social');
        btn.onclick=()=>{social.classList.toggle('show-social');btn.classList.toggle('show-icon')};
    </script>
</body>
</html>
